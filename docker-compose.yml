services:
  mimo-free-api-mcp:
    container_name: mimo-free-api-mcp
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8001:8001"
    environment:
      - TZ=Asia/Shanghai
      - SERVER_ENV=prod
      - NODE_ENV=production
      - token=${token:-}
    # ✨ Fixed Media Storage
    # To enable local file analysis, add a volumes section:
    # volumes:
    #   - /path/to/your/media:/app/media:ro
